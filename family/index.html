<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <!-- Tetapan penting untuk memastikannya kelihatan cantik di telefon (Responsive) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Kalendar Keluarga Rafeeq</title>
    
    <!-- Tetapan Ikon untuk "Add to Home Screen" -->
    <link rel="icon" href="a2c48970-2bea-4726-b2f2-8d787fe5987b.jpg">
    <link rel="apple-touch-icon" href="a2c48970-2bea-4726-b2f2-8d787fe5987b.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kalendar">

    <!-- Memuatkan Tailwind CSS untuk rekaan gaya -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CSS Tambahan (Scrollbar) -->
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Bekas Utama Aplikasi -->
    <div id="root"></div>

    <!-- Memuatkan React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Memuatkan Babel untuk memproses kod React (JSX) di dalam fail HTML ini -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Modul Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Memindahkan fungsi Firebase ke global (window) supaya boleh dibaca oleh skrip Babel di bawah
        window.firebaseApp = { initializeApp };
        window.firebaseAuth = { getAuth, signInAnonymously, onAuthStateChanged };
        window.firebaseFirestore = { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc };
    </script>

    <!-- Skrip Aplikasi Utama (React JSX) -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { initializeApp } = window.firebaseApp;
        const { getAuth, signInAnonymously, onAuthStateChanged } = window.firebaseAuth;
        const { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } = window.firebaseFirestore;

        // --- IKON-IKON SVG (Menggantikan Lucide-React) ---
        const CalendarIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const User = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const Plus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const Trash2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const ChevronLeft = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const Lock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const Unlock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const Eye = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const XIcon = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        // --- DATA KONFIGURASI AHLI KELUARGA ---
        const FAMILY_MEMBERS = [
            { id: 'fateemah', name: 'Fateemah Azizah', theme: 'bg-pink-100 text-pink-800 border-pink-300', dot: 'bg-pink-500', hex: '#ec4899' },
            { id: 'irbadh', name: 'Irbadh Tirmeedzi', theme: 'bg-blue-100 text-blue-800 border-blue-300', dot: 'bg-blue-500', hex: '#3b82f6' },
            { id: 'dewi', name: 'Dewi Haleema', theme: 'bg-purple-100 text-purple-800 border-purple-300', dot: 'bg-purple-500', hex: '#a855f7' },
            { id: 'mama', name: 'Mama', theme: 'bg-[#f5f5dc] text-[#8b7d3a] border-[#e3e3c8]', dot: 'bg-[#d4c473]', hex: '#d4c473' },
            { id: 'babah', name: 'Babah', theme: 'bg-red-100 text-red-800 border-red-300', dot: 'bg-red-500', hex: '#ef4444' }
        ];

        const MONTH_NAMES = [
            "Januari", "Februari", "Mac", "April", "Mei", "Jun",
            "Julai", "Ogos", "September", "Oktober", "November", "Disember"
        ];

        const DAYS_SHORT = ["Ahd", "Isn", "Sel", "Rab", "Kha", "Jum", "Sab"];

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDnewgXMWei0LL6QSSGwH8HLEAw7wSwjsU",
            authDomain: "kalendar-family.firebaseapp.com",
            projectId: "kalendar-family",
            storageBucket: "kalendar-family.firebasestorage.app",
            messagingSenderId: "535833173594",
            appId: "1:535833173594:web:9bad0f9697959635790263",
            measurementId: "G-GKBZS248V2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'kalendar-family';

        function App() {
            // --- STATE PENGURUSAN ---
            const [events, setEvents] = useState([]);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('keseluruhan');
            const [currentDate, setCurrentDate] = useState(new Date());
            
            // Mod Akses menggunakan Kata Laluan
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState('');

            // Form State
            const [newEventTitle, setNewEventTitle] = useState('');
            const [newEventDate, setNewEventDate] = useState('');

            // --- LOGIK FIREBASE (CLOUD STORAGE) ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Ralat pengesahan Firebase:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Menyedut data secara 'Live' dari pangkalan data Firebase
                const eventsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'events');
                const unsubscribe = onSnapshot(eventsRef, (snapshot) => {
                    const loadedEvents = [];
                    snapshot.forEach((document) => {
                        loadedEvents.push({ id: document.id, ...document.data() });
                    });
                    
                    // Susun mengikut tarikh
                    loadedEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                    setEvents(loadedEvents);
                }, (error) => {
                    console.error("Ralat mengambil data:", error);
                });

                return () => unsubscribe();
            }, [user]);

            // --- LOGIK KALENDAR ---
            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const prevMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const nextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            // --- LOGIK KATA LALUAN ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'yahmat') {
                    setIsUnlocked(true);
                    setShowLoginModal(false);
                    setPasswordInput('');
                    setPasswordError('');
                } else {
                    setPasswordError('Kata laluan salah.');
                }
            };

            // --- LOGIK AKTIVITI ---
            const handleAddEvent = async (e) => {
                e.preventDefault();
                if (!newEventTitle || !newEventDate || !user) return;

                const newEvent = {
                    date: newEventDate,
                    personId: activeTab,
                    title: newEventTitle,
                    createdAt: Date.now()
                };

                try {
                    const eventsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'events');
                    await addDoc(eventsRef, newEvent);
                    setNewEventTitle('');
                    setNewEventDate('');
                } catch (error) {
                    console.error("Ralat menambah aktiviti:", error);
                }
            };

            const handleDeleteEvent = async (id) => {
                if (!user) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'events', id));
                } catch (error) {
                    console.error("Ralat memadam aktiviti:", error);
                }
            };

            // --- KOMPONEN BANTUAN ---
            const renderCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = getDaysInMonth(year, month);
                const firstDay = getFirstDayOfMonth(year, month);
                
                const days = [];
                
                // Ruang kosong untuk hari sebelum bermula bulan
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="p-2 border border-transparent"></div>);
                }

                // Hari-hari dalam bulan
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    const dayEvents = events.filter(e => 
                        e.date === dateString && 
                        (activeTab === 'keseluruhan' || e.personId === activeTab)
                    );

                    days.push(
                        <div key={day} className="min-h-[80px] p-1 border border-gray-100 bg-white rounded-md shadow-sm flex flex-col hover:bg-gray-50 transition-colors">
                            <span className="text-sm font-semibold text-gray-500 ml-1">{day}</span>
                            <div className="flex flex-col gap-1 mt-1 flex-grow overflow-y-auto max-h-[80px] custom-scrollbar">
                                {dayEvents.map(event => {
                                    const person = FAMILY_MEMBERS.find(p => p.id === event.personId);
                                    return (
                                        <div 
                                            key={event.id} 
                                            className={`text-[10px] sm:text-xs px-1.5 py-0.5 rounded-sm truncate border ${person?.theme}`}
                                            title={event.title}
                                        >
                                            {event.title}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            const renderActiveView = () => {
                if (activeTab === 'keseluruhan') {
                    return (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 mb-6">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                    <CalendarIcon className="w-6 h-6 text-indigo-600" />
                                    Kalendar Keseluruhan
                                </h2>
                                <div className="flex gap-2">
                                    <button onClick={prevMonth} className="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition-colors">
                                        <ChevronLeft className="w-5 h-5" />
                                    </button>
                                    <div className="text-base sm:text-lg font-bold text-gray-800 min-w-[140px] text-center flex items-center justify-center">
                                        {MONTH_NAMES[currentDate.getMonth()]} {currentDate.getFullYear()}
                                    </div>
                                    <button onClick={nextMonth} className="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition-colors">
                                        <ChevronRight className="w-5 h-5" />
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-7 gap-1 sm:gap-2 mb-2 text-center">
                                {DAYS_SHORT.map(day => (
                                    <div key={day} className="text-xs sm:text-sm font-bold text-gray-400 py-2 uppercase tracking-wider">{day}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7 gap-1 sm:gap-2 bg-gray-50 p-2 rounded-xl">
                                {renderCalendarDays()}
                            </div>
                        </div>
                    );
                }

                // Paparan Individu
                const person = FAMILY_MEMBERS.find(p => p.id === activeTab);
                const personEvents = events.filter(e => e.personId === activeTab).sort((a, b) => new Date(a.date) - new Date(b.date));

                return (
                    <div className="flex flex-col md:flex-row gap-6">
                        {/* Form Tambah Aktiviti - Hanya tunjuk jika Admin */}
                        {isUnlocked && (
                            <div className="w-full md:w-1/3">
                                <div className={`bg-white rounded-2xl shadow-sm border p-6 sticky top-6 ${person.theme.split(' ')[2]}`}>
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                                        <Plus className="w-5 h-5" />
                                        Tambah Aktiviti
                                    </h2>
                                    <p className="text-sm text-gray-500 mb-6">Sila isi ruang di bawah. Ia akan automatik masuk ke Kalendar Keseluruhan.</p>
                                    
                                    <form onSubmit={handleAddEvent} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Nama Aktiviti</label>
                                            <input 
                                                type="text" 
                                                required
                                                className="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-opacity-50 transition-all text-gray-800"
                                                placeholder="Contoh: Kelas Renang"
                                                value={newEventTitle}
                                                onChange={(e) => setNewEventTitle(e.target.value)}
                                                style={{ focusRingColor: person.hex }}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-1">Tarikh</label>
                                            <input 
                                                type="date" 
                                                required
                                                className="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-opacity-50 transition-all text-gray-800"
                                                value={newEventDate}
                                                onChange={(e) => setNewEventDate(e.target.value)}
                                            />
                                        </div>
                                        <button 
                                            type="submit" 
                                            className={`w-full py-3 px-4 rounded-xl font-bold text-white shadow-sm transition-transform active:scale-95`}
                                            style={{ backgroundColor: person.hex }}
                                        >
                                            Simpan Aktiviti
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Senarai Aktiviti Individu */}
                        <div className={`w-full ${isUnlocked ? 'md:w-2/3' : 'w-full'}`}>
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                                <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                                    <User className="w-5 h-5 text-gray-400" />
                                    Senarai Aktiviti {person.name}
                                </h2>
                                
                                {personEvents.length === 0 ? (
                                    <div className="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                                        <p className="text-gray-400">Tiada aktiviti dijadualkan setakat ini.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {personEvents.map(event => (
                                            <div key={event.id} className={`flex items-center justify-between p-4 rounded-xl border ${person.theme}`}>
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-lg">{event.title}</span>
                                                    <span className="text-sm opacity-80 mt-1">
                                                        {new Date(event.date).toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                                    </span>
                                                </div>
                                                {isUnlocked && (
                                                    <button 
                                                        onClick={() => handleDeleteEvent(event.id)}
                                                        className="p-2 bg-white bg-opacity-50 rounded-full hover:bg-opacity-100 transition-colors"
                                                        title="Padam"
                                                    >
                                                        <Trash2 className="w-5 h-5 text-red-500" />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="pb-10">
                    {/* HEADER & PENGURUSAN AKSES */}
                    <div className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <h1 className="text-2xl font-extrabold text-gray-800 tracking-tight">
                                Kalendar Keluarga <span className="text-indigo-600">Pro</span>
                            </h1>
                            
                            {/* Butang Login / Logout */}
                            <div className="flex items-center">
                                {isUnlocked ? (
                                    <button 
                                        onClick={() => setIsUnlocked(false)}
                                        className="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 rounded-full text-sm font-semibold hover:bg-red-100 transition-all border border-red-100 shadow-sm"
                                    >
                                        <Unlock className="w-4 h-4" /> Kunci Semula
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setShowLoginModal(true)}
                                        className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-full text-sm font-semibold hover:bg-indigo-100 transition-all border border-indigo-100 shadow-sm"
                                    >
                                        <Lock className="w-4 h-4" /> Mod Ibu Bapa
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* TABS (Keseluruhan & Ahli Keluarga) */}
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 mt-2">
                            <div className="flex overflow-x-auto custom-scrollbar gap-2 pb-3 pt-2 items-center">
                                <button
                                    onClick={() => setActiveTab('keseluruhan')}
                                    className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all ${
                                        activeTab === 'keseluruhan' 
                                            ? 'bg-indigo-600 text-white shadow-md' 
                                            : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'
                                    }`}
                                >
                                    Kalendar Keseluruhan
                                </button>
                                
                                <div className="h-6 w-px bg-gray-300 mx-1 flex-shrink-0"></div>

                                {FAMILY_MEMBERS.map((person) => (
                                    <button
                                        key={person.id}
                                        onClick={() => setActiveTab(person.id)}
                                        className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all border ${
                                            activeTab === person.id 
                                                ? `${person.theme} shadow-md border-opacity-100 scale-105` 
                                                : `bg-white text-gray-600 border-gray-200 hover:bg-gray-50 opacity-80`
                                        }`}
                                    >
                                        <span className={`w-3 h-3 rounded-full ${person.dot}`}></span>
                                        {person.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* KAWASAN KANDUNGAN UTAMA */}
                    <main className="max-w-6xl mx-auto px-4 sm:px-6 pt-8">
                        {/* Mesej Kesedaran Mod */}
                        {!isUnlocked && (
                            <div className="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-xl mb-6 flex items-center gap-3">
                                <Eye className="w-5 h-5 flex-shrink-0" />
                                <p className="text-sm"><strong>Mod Paparan:</strong> Anda hanya boleh melihat jadual. Klik butang 'Mod Ibu Bapa' di atas untuk menambah atau memadam aktiviti.</p>
                            </div>
                        )}

                        {renderActiveView()}
                    </main>
                    
                    {/* MODAL LOGIN */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 animate-in fade-in zoom-in duration-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold text-gray-800">Sahkan Identiti</h3>
                                    <button onClick={() => {setShowLoginModal(false); setPasswordError(''); setPasswordInput('');}} className="text-gray-400 hover:text-gray-600">
                                        <XIcon className="w-5 h-5" />
                                    </button>
                                </div>
                                <p className="text-sm text-gray-500 mb-6">Sila masukkan kata laluan untuk mengedit kalendar keluarga.</p>
                                <form onSubmit={handleLogin}>
                                    <input
                                        type="password"
                                        className={`w-full p-3 rounded-xl border ${passwordError ? 'border-red-300 bg-red-50' : 'border-gray-200'} mb-2 focus:ring-2 focus:ring-indigo-500 outline-none transition-colors text-gray-800`}
                                        placeholder="Kata Laluan"
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        autoFocus
                                    />
                                    {passwordError && <p className="text-red-500 text-sm mb-4 font-medium">{passwordError}</p>}
                                    {!passwordError && <div className="mb-4"></div>}
                                    
                                    <button type="submit" className="w-full py-3 px-4 bg-indigo-600 text-white rounded-xl font-bold shadow-sm hover:bg-indigo-700 transition-colors">
                                        Buka Kunci
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
